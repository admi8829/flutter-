name: Flutter Build & Validate CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build and Analyze Flutter Application
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code from your repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Java Development Kit (JDK) - required for build toolchains like Gradle / Android SDK
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # Step 3: Install Flutter and Dart Runtime Environment
      - name: Setup Flutter Toolchain
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'latest'
          channel: 'stable'
          cache: true

      # Step 4: Display environment output for verification
      - name: Verify Flutter Installation
        run: flutter --version

      # Step 5: Pull down all specified packages configured in pubspec.yaml
      - name: Get Project Dependencies
        run: flutter pub get

      # Step 6: Validate files layout and run Dart static analysis (Linting)
      - name: Code Static Analysis
        run: flutter analyze

      # Step 7: Complete all unit tests in the framework
      - name: Run Test Suites
        run: flutter test

      # Step 8: Compile standard production APK outputs
      - name: Build Android Release Application (APK)
        run: flutter build apk --release

      # Step 9: Make compiled binary files available as build artifacts
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: flutter-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
